<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard — omann.org</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #7a7f96;
      --accent: #4f8ef7;
      --ok: #3dd68c;
      --warn: #f5a623;
      --error: #f25f5c;
      --idle: #6b7280;
      --critical: #f25f5c;
      --stale: #f5a623;
      --silent: #f0c040;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: color 0.15s;
    }
    #refresh-btn:hover { color: var(--text); }
    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pillar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .pillar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .pillar-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }

    .pillar-week {
      font-size: 12px;
      color: var(--muted);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .stat.ok .stat-value    { color: var(--ok); }
    .stat.warn .stat-value  { color: var(--warn); }
    .stat.error .stat-value { color: var(--error); }
    .stat.muted .stat-value { color: var(--muted); }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .flag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .flag-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 12px;
    }

    .flag-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-ok       { background: var(--ok); }
    .dot-idle     { background: var(--idle); }
    .dot-stale    { background: var(--stale); }
    .dot-silent   { background: var(--silent); }
    .dot-critical { background: var(--critical); }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .project-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
    }

    .project-flag {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .project-name {
      flex: 1;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .attention-section {
      margin-top: 10px;
    }

    .error-box {
      background: rgba(242, 95, 92, 0.1);
      border: 1px solid rgba(242, 95, 92, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--error);
      font-size: 13px;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 14px;
    }

    .ts {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <h1>Life Dashboard</h1>
  <button id="refresh-btn" onclick="load()">↻ Refresh</button>
</header>

<div id="root"><div class="loading">Loading...</div></div>

<div class="ts" id="render-ts"></div>

<script>
const SOURCE_URL = "/data/life.json";

function flagDotClass(flag) {
  const m = { OK: "dot-ok", IDLE: "dot-idle", "GIT-STALE": "dot-stale", "OV-SILENT": "dot-silent", CRITICAL: "dot-critical" };
  return m[flag] || "dot-idle";
}

function flagLabel(flag) {
  const m = { OK: "OK", IDLE: "Idle", "GIT-STALE": "Git Stale", "OV-SILENT": "OV Silent", CRITICAL: "Critical" };
  return m[flag] || flag;
}

function renderPillar(data) {
  const n = data.notion_tasks || {};
  const g = data.git_health || {};
  const projects = data.projects || [];

  const hasOverdue  = (n.overdue  || 0) > 0;

  const flagCounts = g.by_flag || {};
  const attention = projects.filter(p => p.flag !== "OK" && p.flag !== "IDLE");

  return `
    <div class="pillar">
      <div class="pillar-header">
        <span class="pillar-title">${data.workspace || "ottomator"}</span>
        <span class="pillar-week">${data.week || ""}</span>
      </div>

      ${n.error ? `<div class="error-box">Notion error: ${n.error}</div>` : `
      <div class="section-label">Notion Tasks</div>
      <div class="stat-grid">
        <div class="stat muted">
          <div class="stat-value">${n.open ?? "—"}</div>
          <div class="stat-label">Open</div>
        </div>
        <div class="stat ${(n.in_progress || 0) > 0 ? "ok" : "muted"}">
          <div class="stat-value">${n.in_progress ?? "—"}</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat ${hasOverdue ? "error" : "ok"}">
          <div class="stat-value">${n.overdue ?? "—"}</div>
          <div class="stat-label">Overdue</div>
        </div>
        <div class="stat muted">
          <div class="stat-value">${n.blocked ?? "—"}</div>
          <div class="stat-label">Human-owned</div>
        </div>
      </div>
      `}

      <div class="section-label">Git / OV Health</div>
      <div class="flag-row">
        ${Object.entries(flagCounts).filter(([,v]) => v > 0).map(([flag, count]) =>
          `<div class="flag-chip"><div class="dot ${flagDotClass(flag)}"></div>${count} ${flagLabel(flag)}</div>`
        ).join("")}
        ${Object.values(flagCounts).every(v => v === 0) ? '<span style="color:var(--muted);font-size:12px">No data</span>' : ""}
      </div>

      ${attention.length > 0 ? `
        <div class="attention-section">
          <div class="section-label">Needs Attention</div>
          <div class="project-list">
            ${attention.map(p => `
              <div class="project-row">
                <div class="project-flag ${flagDotClass(p.flag)}"></div>
                <div class="project-name">${p.name}</div>
                <div class="project-meta">${p.last_commit_ago || "never"}</div>
              </div>
            `).join("")}
          </div>
        </div>
      ` : `<div style="font-size:13px;color:var(--ok);margin-top:4px">All projects healthy</div>`}
    </div>
  `;
}

async function load() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");

  const root = document.getElementById("root");
  root.innerHTML = '<div class="loading">Loading...</div>';

  try {
    const res = await fetch(SOURCE_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    root.innerHTML = renderPillar(data);
  } catch (e) {
    root.innerHTML = `<div class="error-box">Failed to load: ${e.message}</div>`;
  }

  document.getElementById("render-ts").textContent =
    "Last refreshed: " + new Date().toLocaleString();

  btn.classList.remove("spinning");
}

load();
</script>

</body>
</html>
